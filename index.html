<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Forta Chat</title>
    <meta name="description" content="Forta Chat — Decentralized Messenger" />
    <link rel="icon" type="image/png" href="/forta-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fafafa" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Open Graph -->
    <meta property="og:title" content="Forta Chat" />
    <meta property="og:description" content="Forta Chat — Decentralized Messenger" />
    <meta property="og:image" content="https://forta.chat/og-image.jpg" />
    <meta property="og:url" content="https://forta.chat" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Forta Chat" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Forta Chat" />
    <meta name="twitter:description" content="Forta Chat — Decentralized Messenger" />
    <meta name="twitter:image" content="https://forta.chat/og-image.jpg" />
  </head>
  <body>
    <div id="app">
      <div id="appLoading"></div>
    </div>
    <!--
      BUG-03: Prevent Android WebView from flipping text direction to RTL.
      Must run before any framework code — inline script, not module.
    -->
    <script>
      (function() {
        var html = document.documentElement;
        // Force LTR immediately
        html.setAttribute('dir', 'ltr');

        // Watch for any runtime injection of dir="rtl" by WebView or plugins
        var observer = new MutationObserver(function(mutations) {
          for (var i = 0; i < mutations.length; i++) {
            if (mutations[i].attributeName === 'dir' && html.getAttribute('dir') !== 'ltr') {
              html.setAttribute('dir', 'ltr');
            }
          }
        });
        observer.observe(html, { attributes: true, attributeFilter: ['dir'] });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
