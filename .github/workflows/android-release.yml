name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npx vite build
        env:
          VITE_BUG_REPORT_TOKEN: ${{ secrets.VITE_BUG_REPORT_TOKEN }}
          VITE_KLIPY_API_KEY: ${{ secrets.VITE_KLIPY_API_KEY }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/release-keystore.jks

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          # Compute versionCode from semver: 1.2.3 -> 10203
          IFS='.' read -r major minor patch <<< "$VERSION"
          VERSION_CODE=$(( ${major:-0} * 10000 + ${minor:-0} * 100 + ${patch:-0} ))
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Inject version into build.gradle
        run: |
          sed -i 's/versionCode .*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/' android/app/build.gradle
          sed -i 's/versionName ".*"/versionName "${{ steps.version.outputs.VERSION }}"/' android/app/build.gradle

      - name: Override Gradle Java home for CI
        run: sed -i 's|^org.gradle.java.home=.*|org.gradle.java.home='"$JAVA_HOME"'|' android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_FILE: release-keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/forta-chat-${{ steps.version.outputs.VERSION }}.apk

      - name: Extract release notes from tag
        id: notes
        run: |
          git fetch origin --tags --force
          BODY="$(git tag -l --format='%(contents:body)' "$GITHUB_REF_NAME")"
          # Use tag body if present, otherwise fall back to subject
          if [ -z "$BODY" ]; then
            BODY="$(git tag -l --format='%(contents:subject)' "$GITHUB_REF_NAME")"
          fi
          {
            echo "NOTES<<EOFNOTES"
            echo "$BODY"
            echo "EOFNOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Forta Chat ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.NOTES }}
          files: android/app/build/outputs/apk/release/forta-chat-${{ steps.version.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f android/app/release-keystore.jks
          rm -f android/app/google-services.json
